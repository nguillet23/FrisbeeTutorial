<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Film Analysis — Ultimate Frisbee</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f2ed;
      --surface: #ffffff;
      --surface-alt: #eef0f5;
      --border: #dcdad4;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --accent-muted: #74c69d;
      --text-primary: #1a1a18;
      --text-secondary: #5c5c58;
      --text-muted: #9a9a94;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-hover: 0 6px 24px rgba(0,0,0,0.12);
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-disc {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-disc::after {
      content: '';
      width: 14px; height: 2px;
      background: white;
      border-radius: 2px;
      transform: rotate(-20deg);
    }

    .header-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 64px);
    }

    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 0.5rem;
      margin-bottom: 0.5rem;
      margin-top: 1.25rem;
    }

    .sidebar-section-label:first-child { margin-top: 0; }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-btn:hover { background: var(--surface-alt); color: var(--text-primary); }
    .sidebar-btn.active { background: var(--accent-light); color: var(--accent); }

    .sidebar-btn .cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-count {
      margin-left: auto;
      font-size: 0.72rem;
      background: var(--surface-alt);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 1px 7px;
      font-weight: 600;
    }

    .sidebar-btn.active .sidebar-count {
      background: var(--accent-muted);
      color: white;
    }

    main {
      padding: 2rem 2.5rem;
      overflow-y: auto;
    }

    .main-header { margin-bottom: 1.75rem; }

    .main-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .main-sub {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .filters-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .search-wrap { position: relative; flex: 1; }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.85rem 0.6rem 2.2rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.15s;
      outline: none;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    .clips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    .clip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .clip-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

    .clip-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .clip-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .clip-notes {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.55;
      border-left: 3px solid var(--border);
      padding-left: 0.75rem;
    }

    .clip-tags-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .micro-tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface-alt);
      color: var(--text-secondary);
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }

    .empty-state h3 {
      font-family: 'DM Serif Display', serif;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .cat-0 { background: #dbeafe; color: #1d4ed8; }
    .cat-1 { background: #fce7f3; color: #9d174d; }
    .cat-2 { background: #d1fae5; color: #065f46; }
    .cat-3 { background: #fef9c3; color: #713f12; }
    .cat-4 { background: #ede9fe; color: #4c1d95; }
    .cat-5 { background: #ffedd5; color: #7c2d12; }
    .cat-6 { background: #cffafe; color: #164e63; }
    .cat-7 { background: #fce7f3; color: #831843; }

    .dot-0 { background: #3b82f6; }
    .dot-1 { background: #ec4899; }
    .dot-2 { background: #10b981; }
    .dot-3 { background: #eab308; }
    .dot-4 { background: #8b5cf6; }
    .dot-5 { background: #f97316; }
    .dot-6 { background: #06b6d4; }
    .dot-7 { background: #db2777; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      aside { display: none; }
      main { padding: 1.25rem; }
      .clips-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-disc"></div>
    Film Analysis
  </div>
  <span class="header-meta">Ultimate Frisbee · Play Library</span>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-section-label">All Plays</div>
    <button class="sidebar-btn active" onclick="filterCategory('all')" id="btn-all">
      <span class="cat-dot" style="background:#94a3b8"></span>
      All Clips
      <span class="sidebar-count" id="count-all">0</span>
    </button>
    <div class="sidebar-section-label">Categories</div>
    <div id="category-list"></div>
  </aside>

  <main>
    <div class="main-header">
      <h1 class="main-title" id="current-category-title">All Clips</h1>
      <p class="main-sub" id="current-category-sub">Browse your film analysis notes</p>
    </div>
    <div class="filters-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search clips, notes, tags…" id="search-input" oninput="renderClips()" />
      </div>
    </div>
    <div class="clips-grid" id="clips-grid"></div>
  </main>
</div>

<script>
  // ================================================================
  // ✏️  CATEGORIES — define your categories here, in display order.
  //     Each entry needs: id, name, desc
  // ================================================================
  const categories = [
    { id: 'offense',  name: 'Offense',      desc: 'Offensive sets, resets, and scoring plays' },
    { id: 'defense',  name: 'Defense',      desc: 'Defensive positioning, poaches, and D-blocks' },
    { id: 'handler',  name: 'Handler Sets', desc: 'Handler motion and reset systems' },
    { id: 'endzone',  name: 'Endzone',      desc: 'End zone offense and defense' },
    { id: 'zone',     name: 'Zone',         desc: 'Zone offense and defense' },
  ];

  // ================================================================
  // ✏️  CLIPS — add new clips here. Rules:
  //
  //   • NO id field needed — it's auto-generated from the title.
  //   • categoryId must match one of the ids above.
  //   • Clips display in the ORDER you write them here, grouped
  //     by category order (offense first, defense second, etc.).
  //   • video is optional — leave as '' to omit the player.
  //   • tags is optional — leave as [] for no tags.
  //
  //  To add a clip, copy one block and paste it at the end of its
  //  category group. That's it!
  // ================================================================
  const clipsRaw = [
    // ── OFFENSE ──────────────────────────────────────────────────
    {
      categoryId: 'offense',
      title: 'Defensively Forced Deep',
      notes: 'Dark #15 is being forced deep, so he does what he is forced. He then sees the disk is swung, so he runs to the other side where the disk will be.',
      tags: ['isolation', 'vertical stack'],
      video: 'videos/Rutledge.mp4',
    },
    {
      categoryId: 'offense',
      title: 'Well Timed Deep Cut',
      notes: '#16 does not cut deep until he makes eye contact with the thrower.',
      tags: ['isolation', 'deep cut'],
      video: 'videos/Anders.mp4',
    },
    {
      categoryId: 'offense',
      title: 'Well Timed Continuation Cut off of Breakside Movement',
      notes: 'There are two cuts to the breakside. The first one sees the second one and decides to cut for him just when he finishes his cut by cutting back under for the disk.',
      tags: ['isolation', 'break cut'],
      video: 'videos/Osgar.mp4',
    },
    {
      categoryId: 'offense',
      title: 'Give and Go Continuation Cut',
      notes: '#34 runs immediately upline after throwing the disk because he sees open space that he knows he can take.',
      tags: ['isolation', 'upline'],
      video: 'videos/Randolph.mp4',
    },

    // ── DEFENSE ──────────────────────────────────────────────────
    {
      categoryId: 'defense',
      title: 'Bracket',
      notes: 'Poacher reads the break-side look perfectly and picks off the around throw. Great communication with the marker to bait the throw.',
      tags: ['bracket', 'switching'],
      video: '',
    },

    // ── HANDLER SETS ─────────────────────────────────────────────
    {
      categoryId: 'handler',
      title: 'Dump-Swing-Break Sequence',
      notes: 'Textbook 3-throw sequence: clean dump reset, immediate swing to the open side, then a sharp inside-out break to the end zone. The mark was late rotating.',
      tags: ['dump', 'swing', 'break', 'reset'],
      video: '',
    },

    // ── ENDZONE ──────────────────────────────────────────────────
    {
      categoryId: 'endzone',
      title: '1 Cut in Endzone',
      notes: "The cutter for the disk doesn't move to the open space until the thrower has the disc in his hand.",
      tags: ['end zone', 'horizontal', 'timing'],
      video: '',
    },

    // ── ZONE ─────────────────────────────────────────────────────
    {
      categoryId: 'zone',
      title: 'Breaking a Zone',
      notes: "Every player is much closer no matter what. Fakes are constantly thrown. The thrower has to be very careful with the timing of the throw and the fake. The cutter has to be very patient and time their cut perfectly.",
      tags: ['zone', 'fakes'],
      video: '',
    },
  ];

  // ================================================================
  // Engine — no need to edit below this line
  // ================================================================

  // Auto-generate stable IDs from title + categoryId
  function makeId(clip) {
    return (clip.categoryId + '-' + clip.title)
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  // Sort clips to match category order, preserving within-category order
  const categoryOrder = categories.map(c => c.id);
  const clips = clipsRaw
    .filter(c => c.title) // skip blank entries
    .map(c => ({ ...c, id: makeId(c) }))
    .sort((a, b) => categoryOrder.indexOf(a.categoryId) - categoryOrder.indexOf(b.categoryId));

  let currentCategory = 'all';

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderSidebar() {
    const list = document.getElementById('category-list');
    list.innerHTML = '';
    categories.forEach((cat, i) => {
      const count = clips.filter(c => c.categoryId === cat.id).length;
      const colorIdx = i % 8;
      const btn = document.createElement('button');
      btn.className = 'sidebar-btn' + (currentCategory === cat.id ? ' active' : '');
      btn.id = 'btn-' + cat.id;
      btn.innerHTML = `
        <span class="cat-dot dot-${colorIdx}"></span>
        ${escHtml(cat.name)}
        <span class="sidebar-count">${count}</span>
      `;
      btn.onclick = () => filterCategory(cat.id);
      list.appendChild(btn);
    });

    document.getElementById('count-all').textContent = clips.length;
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    const active = document.getElementById('btn-' + currentCategory);
    if (active) active.classList.add('active');
  }

  function renderClips() {
    const grid = document.getElementById('clips-grid');
    const query = document.getElementById('search-input').value.toLowerCase();

    const filtered = clips.filter(c => {
      const inCat = currentCategory === 'all' || c.categoryId === currentCategory;
      const inSearch = !query ||
        c.title.toLowerCase().includes(query) ||
        (c.notes || '').toLowerCase().includes(query) ||
        (c.tags || []).some(t => t.toLowerCase().includes(query));
      return inCat && inSearch;
    });

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🥏</div>
          <h3>No clips found</h3>
          <p>Try a different search or category.</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(clip => {
      const cat = categories.find(c => c.id === clip.categoryId);
      const catIdx = categories.indexOf(cat);
      const colorIdx = (catIdx >= 0 ? catIdx : 0) % 8;
      const tagsHtml = (clip.tags || []).map(t => `<span class="micro-tag">${escHtml(t)}</span>`).join('');

      return `
        <div class="clip-card">
          <div><span class="clip-tag cat-${colorIdx}">${escHtml(cat ? cat.name : '—')}</span></div>
          <div class="clip-title">${escHtml(clip.title)}</div>
          ${clip.notes ? `<div class="clip-notes">${escHtml(clip.notes)}</div>` : ''}
          ${clip.video ? `<video controls style="width:100%;border-radius:8px;" src="${escHtml(clip.video)}"></video>` : ''}
          ${tagsHtml   ? `<div class="clip-tags-row">${tagsHtml}</div>` : ''}
        </div>`;
    }).join('');
  }

  function filterCategory(id) {
    currentCategory = id;
    const cat = categories.find(c => c.id === id);
    document.getElementById('current-category-title').textContent =
      id === 'all' ? 'All Clips' : (cat?.name || 'Clips');
    document.getElementById('current-category-sub').textContent =
      id === 'all' ? 'Browse your film analysis notes' : (cat?.desc || '');
    renderSidebar();
    renderClips();
  }

  renderSidebar();
  renderClips();
</script>
</body>
</html>
